<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function showFlag(){
            alert('show');
            let name=prompt('Enter a name: ');
            let flag="";
            for (let i = 0; i < name.length; i++) {
                for (let j = 0; j <=i; j++) {
                    flag=flag+name.charAt(j);  
                }
                flag=flag+"<br>";   
            }
            document.getElementById("p1").innerHTML=flag;
        }
    </script>
</head>
<body>
    <div>
        <input type="button" value="Show Name Flag" onclick="showFlag()">
        <p id="p1">Flag will be displayed here...</p>
    </div>
</body>
</html>
