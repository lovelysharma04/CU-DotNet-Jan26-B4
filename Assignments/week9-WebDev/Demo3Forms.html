<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>Employee Registration Form</h1>
    <form>
        <table>
            <tr>
                <td>
                    <label>Enter Your Name</label>
                </td>
                <td>
                    <input type="text" pattern="^[A-Z]{1}[a-z]{1,}$" name="ename" id="ename" required/>
                </td>
            </tr>
             <tr>
                <td>
                    <label>Select DOB</label>
                </td>
                <td>
                    <input type="date" name="dob" id="dob" min="2000-01-01" max="2026-01-01"required/>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Select Gender</label>
                </td>
                <td>
                    <input type="radio" name="Gender" id="male" value="M" required/>
                    <label for="male">Male</label>
                    <input type="radio" name="Gender" id="female" value="F" required/>
                    <label for="female">Female</label>
                </td>
            </tr>
             <tr>
                <td>
                    <label>Enter Age</label>
                </td>
                <td>
                    <input type="number" name="age" id="age" min="18" max="90"required/>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Select City</label>
                </td>
                <td>
                   <select id="city" name="city" required>
                        <option value="">Select</option>
                        <option value="1">Delhi</option>
                        <option value="2">Mumbai</option>
                        <option value="3">Pune</option>
                        <option value="4">Chennai</option>
                        <option value="5">Gwalior</option>
                        <option value="6">Kolkata</option>
                   </select>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Enter Your Email</label>
                </td>
                <td>
                    <input type="email" placeholder="abc@abc.com" name="email" id="email" required/>
                </td>
            </tr>
             <tr>
                <td>
                    <label>Enter Your Pan Number</label>
                </td>
                <td>
                    <input type="text" placeholder="ABCDE1234Z" pattern="^[A-Z]{5}[0-9]{4}[A-Z]{1}$" name="pan" id="pan" required/>
                </td>
            </tr>
            <tr>
                <td> 
                </td>
                <td>
                   <input type="Submit"/>
                   <input type="Reset"/>
                </td>
                
            </tr>

        </table>
    </form>
</body>
</html>
